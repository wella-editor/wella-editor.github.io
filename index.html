<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 40px;
    }

    .menu a {
      display: block;
      margin: 15px 0;
      font-size: 20px;
      text-decoration: none;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      transition: 0.3s;
    }

    .menu a:hover {
      background: rgba(255,255,255,0.3);
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 24px;
      }

      .menu a {
        font-size: 18px;
      }
    }
  </style>
